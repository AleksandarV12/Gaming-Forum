<div class="create-theme-container">
  <h2 class="page-title">Create a New Theme</h2>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="form-group">
    <label>Theme Name</label>
    <input
      [(ngModel)]="themeName"
      placeholder="Enter theme name..."
      type="text"
      class="form-input"
    />
    <span *ngIf="themeName.length > 0 && themeName.length < 3" class="warning">
      Theme name must be at least 3 characters.
    </span>
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea
      [(ngModel)]="description"
      placeholder="Describe your theme..."
      rows="6"
      class="form-input"
    ></textarea>
    <span
      *ngIf="description.length > 0 && description.length < 10"
      class="warning"
    >
      Description must be at least 10 characters.
    </span>
  </div>

  <button class="btn-submit" (click)="createTheme()">Create Theme</button>
</div>
