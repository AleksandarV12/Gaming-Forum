<div class="post-details" *ngIf="post; else loading">
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div *ngIf="!isEditing">
    <h2>{{ post.title }}</h2>
    <p>{{ post.text }}</p>
    <p class="meta">Posted on {{ post.createdAt | date : "mediumDate" }}</p>

    <div *ngIf="isOwner()" class="actions">
      <button (click)="startEdit()">Edit</button>
      <button (click)="deletePost()" class="danger">Delete</button>
    </div>
  </div>

  <div *ngIf="isEditing">
    <h2>Edit Post</h2>
    <input [(ngModel)]="editTitle" placeholder="Title" />
    <textarea [(ngModel)]="editText" placeholder="Text"></textarea>
    <button (click)="saveEdit()">Save</button>
    <button (click)="cancelEdit()">Cancel</button>
  </div>
</div>

<ng-template #loading>
  <p>Loading post...</p>
</ng-template>
