<div class="create-post">
  <h2>Create Post</h2>

  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>

  <div>
    <input [(ngModel)]="title" placeholder="Title" type="text" />
    <span *ngIf="title.length > 0 && title.length < 3" class="warning">
      Title must be at least 3 characters.
    </span>
  </div>

  <div>
    <input [(ngModel)]="themeId" placeholder="Theme ID" type="text" />
  </div>

  <div>
    <textarea
      [(ngModel)]="text"
      placeholder="Write your post..."
      rows="6"
    ></textarea>
    <span *ngIf="text.length > 0 && text.length < 10" class="warning">
      Text must be at least 10 characters.
    </span>
  </div>

  <button (click)="onSubmit()">Create Post</button>
</div>
