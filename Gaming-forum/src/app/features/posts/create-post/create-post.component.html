<div class="create-post-container">
  <h2 class="page-title">Create a New Post</h2>

  <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>

  <div class="form-group">
    <label>Title</label>
    <input
      [(ngModel)]="title"
      placeholder="Enter post title..."
      type="text"
      class="form-input"
    />
    <span *ngIf="title.length > 0 && title.length < 3" class="warning">
      Title must be at least 3 characters.
    </span>
  </div>

  <div class="form-group">
    <label>Theme</label>
    <select [(ngModel)]="themeId" class="form-input">
      <option value="" disabled>Select a theme...</option>
      <option *ngFor="let theme of themes" [value]="theme._id">
        {{ theme.themeName }}
      </option>
    </select>
  </div>

  <div class="form-group">
    <label>Content</label>
    <textarea
      [(ngModel)]="text"
      placeholder="Write your post..."
      rows="8"
      class="form-input"
    ></textarea>
    <span *ngIf="text.length > 0 && text.length < 10" class="warning">
      Text must be at least 10 characters.
    </span>
  </div>

  <button class="btn-submit" (click)="onSubmit()">Publish Post</button>
</div>
