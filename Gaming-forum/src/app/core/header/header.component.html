<nav class="navbar">

  <!-- Left: Hamburger Menu -->
  <div class="nav-dropdown" (click)="toggleDropdown()">
    <button class="hamburger-btn">
      <i class="fas fa-bars"></i>
    </button>
    <div class="dropdown-menu" [ngClass]="{ show: isDropdownOpen }">
      <a class="dropdown-item" routerLink="/home" (click)="isDropdownOpen=false">
        🏠 Home
      </a>
      <a class="dropdown-item" routerLink="/themes" (click)="isDropdownOpen=false">
        🎮 Themes
      </a>
      <a class="dropdown-item" routerLink="/posts" (click)="isDropdownOpen=false">
        💬 Posts
      </a>
      <a class="dropdown-item" routerLink="/about" (click)="isDropdownOpen=false">
        ℹ️ About Us
      </a>
      <a class="dropdown-item" routerLink="/contact" (click)="isDropdownOpen=false">
        📧 Contact
      </a>
    </div>
  </div>

  <!-- Center: Site Title -->
  <a routerLink="/home" class="site-title">
    <span class="title-icon">🎮</span>
    <span class="title-text">Gorum</span>
  </a>

  <!-- Right: Auth Links -->
  <div class="nav-right">

    <!-- Logged in -->
    <ng-container *ngIf="authService.isLoggedIn()">
      <a routerLink="/dashboard" class="nav-link">Dashboard</a>
      <a routerLink="/create-post" class="nav-link nav-link-highlight">+ New Post</a>

      <!-- Profile Dropdown -->
      <div class="nav-dropdown" (click)="toggleProfileMenu()">
        <button class="profile-btn">
          <span class="avatar">{{ authService.getUsername().charAt(0).toUpperCase() }}</span>
          <span class="username-text">{{ authService.getUsername() }}</span>
          <i class="fas fa-chevron-down chevron"></i>
        </button>
        <div class="dropdown-menu dropdown-right" [ngClass]="{ show: isProfileMenuOpen }">
          <a class="dropdown-item" routerLink="/profile" (click)="isProfileMenuOpen=false">
            👤 Profile
          </a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item dropdown-item-danger" (click)="logout()">
            🚪 Logout
          </a>
        </div>
      </div>
    </ng-container>

    <!-- Logged out -->
    <ng-container *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" class="nav-link">Login</a>
      <a routerLink="/register" class="nav-link nav-link-highlight">Register</a>
    </ng-container>

  </div>
</nav>
